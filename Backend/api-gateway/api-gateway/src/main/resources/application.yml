server:
  port: 9091

logging:
  level:
    org.springframework.cloud.gateway: TRACE

spring:
  application:
    name: API-GATEWAY

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/crisisAi

  cloud:
    gateway:
      routes:

        # ✅ CORE SERVICE
        - id: core-service
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/core/**

        # ✅ LOCATION SERVICE
        - id: location-service
          uri: lb://LOCATION-SERVICE
          predicates:
            - Path=/location/**

        # ✅ AI SERVICE
        - id: ai-service
          uri: lb://AI-SERVICE
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=1   # 🔥 FIXED (IMPORTANT)

# ✅ Eureka config
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/